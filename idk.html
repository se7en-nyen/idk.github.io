<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Blur, Particles & Click Ripple Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0c10;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px; /* Tạo không gian 3D cho toàn bộ trang */
        }

        /* Lớp nền mờ ảo tạo chiều sâu */
        .ambient-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(74, 0, 224, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.1) 0%, transparent 40%);
            z-index: 1;
            pointer-events: none;
        }

        /* Đèn Blur đuổi theo chuột (Lớp sâu nhất - Layer 1) */
        .mouse-blur {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.25) 0%, rgba(74, 0, 224, 0.1) 50%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: screen;
            filter: blur(40px);
            z-index: 2;
            transform: translate(-50%, -50%);
            /* Smooth chuyển động mượt mà */
            transition: transform 0.1s ease-out; 
        }

        /* Canvas chứa các hạt môi trường (Layer 2) */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        /* Nội dung chính ở giữa màn hình (Lớp trên cùng tạo chiều sâu nổi lên - Layer 3) */
        .card-container {
            position: relative;
            z-index: 4;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            transform: translateZ(50px); /* Đẩy card nổi lên trong không gian 3D */
            color: #fff;
            max-width: 450px;
            transition: transform 0.2s ease-out;
            cursor: pointer; /* Thêm con trỏ bàn tay để biểu thị có thể click */
            overflow: hidden; /* Cần thiết cho hiệu ứng ripple */
        }

        .card-container h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00e5ff, #7209b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .card-container p {
            color: #8a99ad;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* Kiểu dáng cho hiệu ứng Ripple (giọt nước) */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3); /* Màu và độ mờ của ripple */
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear; /* Thời gian và kiểu animation */
            pointer-events: none; /* Đảm bảo không cản trở click */
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4); /* Kích thước tối đa khi lan ra */
                opacity: 0; /* Mờ dần */
            }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="mouse-blur" id="mouseBlur"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="card-container" id="card">
        <h1>Thg ngu
        <p>chan bmay đi?.</p>
    </div>

    <script>
        const mouseBlur = document.getElementById('mouseBlur');
        const card = document.getElementById('card');
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        // Cấu hình Canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Khởi tạo các hạt (Particles)
        const particlesArray = [];
        const numberOfParticles = 80;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Kích cỡ khác nhau tạo chiều sâu xa gần (Z-index giả lập)
                this.size = Math.random() * 3 + 0.5; 
                // Tốc độ bay tự nhiên của hạt
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                // Độ mờ khác nhau
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update(mouseX, mouseY) {
                // Di chuyển tự nhiên
                this.x += this.speedX;
                this.y += this.speedY;

                // Tương tác đẩy nhẹ hạt khi chuột đến gần (tạo hiệu ứng gió/môi trường sống động)
                if (mouseX && mouseY) {
                    let dx = this.x - mouseX;
                    let dy = this.y - mouseY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 150) {
                        let force = (150 - distance) / 150;
                        this.x += (dx / distance) * force * 2;
                        this.y += (dy / distance) * force * 2;
                    }
                }

                // Giữ hạt luôn ở trong màn hình
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 229, 255, ${this.opacity})`;
                ctx.shadowBlur = this.size * 2; // Hạt phát sáng nhẹ
                ctx.shadowColor = '#00e5ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow để không lag
            }
        }

        // Tạo mảng hạt
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }

        // Tọa độ chuột thực tế và tọa độ mượt (lerp) để tạo độ trễ nghệ thuật
        let mouse = { x: undefined, y: undefined };
        let targetMouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            // --- Hiệu ứng chiều sâu 3D (Parallax Card) ---
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg) translateZ(50px)`;
        });

        // Trả Card về vị trí cũ khi chuột rời màn hình
        window.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg) translateZ(0px)`;
            mouse.x = undefined;
            mouse.y = undefined;
        });

        // --- Bổ sung hiệu ứng Ripple khi click ---
        card.addEventListener('click', function(e) {
            const x = e.clientX - e.target.offsetLeft;
            const y = e.clientY - e.target.offsetTop;

            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;

            this.appendChild(ripple);

            // Xóa element ripple sau khi animation kết thúc
            setTimeout(() => {
                ripple.remove();
            }, 600); // Trùng với thời gian animation
        });
        // --- Kết thúc bổ sung hiệu ứng Ripple ---

        // Vòng lặp Animation mượt mà (60fps)
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Thuật toán nội suy tuyến tính (LERP) giúp tâm Blur đuổi theo chuột mượt và có độ trễ sang xịn mịn
            if (mouse.x !== undefined) {
                targetMouse.x += (mouse.x - targetMouse.x) * 0.08;
                targetMouse.y += (mouse.y - targetMouse.y) * 0.08;
            }

            // Cập nhật vị trí quầng sáng Blur
            mouseBlur.style.left = `${targetMouse.x}px`;
            mouseBlur.style.top = `${targetMouse.y}px`;

            // Cập nhật và vẽ các hạt
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update(mouse.x, mouse.y);
                particlesArray[i].draw();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
